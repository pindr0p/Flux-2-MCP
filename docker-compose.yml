services:
  flux-mcp:
    build:
      context: .
    image: librechat-flux-mcp:local
    restart: unless-stopped
    network_mode: bridge
    env_file:
      - .env
    ports:
      - "${FLUX_HTTP_PUBLISHED_PORT:-3001}:3000"
    environment:
      FLUX_HTTP_HOST: "0.0.0.0"
      FLUX_HTTP_PORT: "3000"
      FLUX_HTTP_MCP_PATH: "/mcp"
      FLUX_OUTPUT_DIR: "/app/data/flux/images"
      FLUX_METADATA_FILE: "/app/data/flux/metadata.json"
    volumes:
      - flux_mcp_data:/app/data/flux
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  flux_mcp_data: